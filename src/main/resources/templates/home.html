<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastebin</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/home_nav.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/home_body.css}">
    <link rel='stylesheet' href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'>
</head>
<body>
<nav class="navbar">
    <div class="nav-bar">
        <i class="bx bx-menu sidebarOpen"></i>
        <span class="logo navLogo"><a href="#">Pastebin</a></span>

        <div class="menu">
            <div class="logo-toggle">
                <span class="logo"><a href="#">Pastebin</a></span>
                <i class='bx bx-x sidebarClose'></i>
            </div>
            <ul class="nav-links">
                <li><a href="#">Главная</a></li>
                <li><a href="#">Публикации</a></li>
                <li><a href="#">О нас</a></li>
                <li><a href="#">Портфолио</a></li>
                <li><a href="#">GitHub</a></li>
            </ul>
        </div>

        <div class="darkLight">
            <div class="dark-light">
                <i class='bx bx-moon moon'></i>
                <i class='bx bx-sun sun'></i>
            </div>
        </div>
    </div>
</nav>

<main class="container">
    <div class="main-content">
        <section class="paste-creation">
            <h2 class="section-title">Новая запись</h2>
            <form th:action="@{/}" method="post" th:object="${pasteCreation}">
                <!-- Основное поле текста -->
                <textarea class="paste-area"
                          placeholder="Введите ваш текст или код здесь..."
                          th:field="*{paste}"></textarea>

                <div class="paste-settings">
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label>Категория</label>
                            <select th:field="*{category}">
                                <option th:each="ctgr : ${Category}"
                                        th:value="${ctgr}"
                                        th:text="${ctgr}"></option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Теги</label>
                            <input type="text" placeholder="java, spring, help" th:field="*{tag}">
                        </div>
                        <div class="setting-item">
                            <label for="expiration">Срок хранения</label>
                            <select id="expiration" th:field="*{expiration}">
                                <option th:each="exp : ${Expiration}"
                                        th:value="${exp}"
                                        th:text="${exp}"></option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label for="access">Доступ</label>
                            <select id="access" th:field="*{access}">
                                <option th:each="acc : ${Access}"
                                        th:value="${acc}"
                                        th:text="${acc}"></option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Защита паролем</label>
                            <div class="radio-group">
                                <div th:each="option, stat : ${PasswordProtect}" class="radio-item">
                                    <!-- Используем индекс stat для уникальных ID -->
                                    <input type="radio"
                                           th:id="${'pass' + stat.index}"
                                           th:value="${option}"
                                           th:field="*{hasPassOrNo}">
                                    <label th:for="${'pass' + stat.index}" th:text="${option}"></label>
                                </div>
                            </div>
                        </div>
                        <div class="setting-item">
                            <label>Пароль</label>
                            <input type="password" placeholder="Опционально" th:field="*{password}">
                        </div>
                    </div>

                    <div class="submit-section">
                        <input type="text" class="paste-name" placeholder="Название записи" th:field="*{title}">
                        <button type="submit" class="btn-publish">Опубликовать</button>
                    </div>
                </div>
            </form>
        </section>

        <aside class="recent-pastes">
            <h3 class="section-title">Недавние записи</h3>
            <ul class="pastes-list">
                <li class="paste-item">
                    <i class='bx bx-file'></i>
                    <div class="paste-info">
                        <a href="#">Пример кода Java</a>
                        <span>2 мин. назад | Java</span>
                    </div>
                </li>
            </ul>
        </aside>
    </div>
</main>
<script th:src="@{/js/home_script.js}"></script>
</body>
</html>
