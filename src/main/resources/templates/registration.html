<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/registration.css}">
</head>
<body>
<div class="container">
    <div class="auth-card">
        <h2 class="section-title">Registration</h2>
        <form id="registrationForm" th:action="@{/registration}" method="post" th:object="${user}">
            <div class="settings-grid">
                <div class="setting-item">
                    <label for="first_name">Firstname</label>
                    <input type="text" id="first_name" placeholder="Ivan" required th:field="*{firstname}">
                </div>
                <div class="setting-item">
                    <label for="last_name">Lastname</label>
                    <input type="text" id="last_name" placeholder="Ivanov" required th:field="*{lastname}">
                </div>
                <div class="setting-item">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="1van_333" required th:field="*{username}">
                    <span class="error-msg" id="usernameError"></span>
                </div>
                <div class="setting-item">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@mail.com" required th:field="*{email}">
                    <span class="error-msg" id="emailError"></span>
                </div>
                <div class="setting-item">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required th:field="*{password}">
                    <span class="error-msg" id="passwordError"></span>
                </div>
                <div class="setting-item">
                    <label for="confirm-password">Confirm password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                    <span class="error-msg" id="confirmError"></span>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit" id="submitBtn" class="btn-publish">Create</button>
                <p class="auth-footer">If already exist? <a th:href="@{/login}">Sign In</a></p>
            </div>
        </form>
    </div>
</div>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
