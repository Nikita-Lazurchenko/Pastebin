<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/registration.css}">
</head>
<body>
<div class="container">
    <div class="auth-card">
        <h2 class="section-title">Новый пароль</h2>

        <form th:action="@{/login/change-password}" method="post" th:object="${user}">

            <div class="settings-grid">
                <div class="setting-item">
                    <label for="password">Новый пароль</label>
                    <input type="password"
                           id="password"
                           name="newPassword"
                           placeholder="••••••••"
                           th:field="*{password}"
                           required>
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="setting-item">
                    <label for="confirm-password">Подтвердите пароль</label>
                    <input type="password"
                           id="confirm-password"
                           name="confirmPassword"
                           placeholder="••••••••"
                           required>
                    <span class="error-msg" id="confirmError"></span>
                </div>
            </div>

            <div class="submit-section">
                <button type="submit" id="submitBtn" class="btn-publish">
                    Обновить пароль
                </button>
                <p class="auth-footer">
                    Вернуться к <a th:href="@{/login}">входу</a>
                </p>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/validation.js}"></script>
</body>
</html>
